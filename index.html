<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opstillingsblade - Ropox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="topbar">
        <div class="logo-container">
            <span class="logo-text">all steel</span>
            <span class="logo-subtext">BY ROPOX</span>
        </div>
        <nav>
            <button id="btn-home" class="nav-button">Hjem</button>
        </nav>
    </header>

    <main id="app-container">
        <!-- View: Home -->
        <section id="view-home" class="view active">
            <div class="header-action">
                <h1>Opstillingsblade</h1>
                <button id="btn-new" class="primary-button">+ Nyt Opstillingsblad</button>
            </div>
            
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Søg på varenummer eller maskine...">
            </div>

            <div class="grid-container" id="sheets-list">
                <!-- Dynamisk genereret indhold kommer her -->
            </div>
        </section>

        <!-- View: Formular -->
        <section id="view-form" class="view">
            <div class="header-action">
                <h1 id="form-title">Opret Opstillingsblad</h1>
                <button id="btn-cancel" class="secondary-button">Annuller</button>
            </div>
            
            <form id="sheet-form" class="card-form">
                <div class="form-group">
                    <label for="f-varenummer">Varenummer *</label>
                    <input type="text" id="f-varenummer" required placeholder="F.eks. 12345-A">
                </div>
                
                <div class="form-group">
                    <label for="f-program">Programnummer</label>
                    <input type="text" id="f-program" placeholder="F.eks. O1001">
                </div>
                
                <div class="form-group">
                    <label for="f-maskine">Maskine *</label>
                    <select id="f-maskine" required>
                        <option value="">Vælg Maskine</option>
                        <option value="Mazak Integrex">Mazak Integrex</option>
                        <option value="Haas VF-2">Haas VF-2</option>
                        <option value="Okuma Multus">Okuma Multus</option>
                        <option value="Doosan Puma">Doosan Puma</option>
                    </select>
                </div>

                <div class="form-section-title">Nulpunkter</div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="f-g54">G54</label>
                        <input type="text" id="f-g54" placeholder="X, Y, Z">
                    </div>
                    <div class="form-group">
                        <label for="f-g55">G55</label>
                        <input type="text" id="f-g55" placeholder="X, Y, Z">
                    </div>
                    <div class="form-group">
                        <label for="f-g56">G56</label>
                        <input type="text" id="f-g56" placeholder="X, Y, Z">
                    </div>
                </div>

                <div class="form-section-title">Værktøjsliste (Tool Setup)</div>
                <div class="form-group">
                    <textarea id="f-tools" rows="5" placeholder="T01 - 10mm Pindfræser&#10;T02 - 8mm Bor..."></textarea>
                </div>

                <div class="form-section-title">Billede af Opstilling</div>
                <div class="form-group image-upload-group">
                    <label for="f-image" class="image-upload-label">
                        <span class="upload-icon">📸</span>
                        <span class="upload-text">Tag Billede eller Vælg Fil</span>
                        <input type="file" id="f-image" accept="image/*" capture="environment">
                    </label>
                    <div id="image-preview-container" class="hidden">
                        <img id="image-preview" src="" alt="Preview">
                        <button type="button" id="btn-remove-image" class="danger-button">Fjern Billede</button>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="primary-button w-full">Gem Opstillingsblad</button>
                </div>
            </form>
        </section>

        <!-- View: Detail -->
        <section id="view-detail" class="view">
            <div class="header-action">
                <h1 id="d-varenummer">Varenummer</h1>
                <div class="action-buttons">
                    <button id="btn-edit" class="secondary-button">Rediger</button>
                    <button id="btn-back" class="secondary-button">Tilbage</button>
                </div>
            </div>

            <div class="detail-card">
                <div class="detail-grid">
                    <div class="detail-info">
                        <div class="info-group">
                            <h3>Maskine</h3>
                            <p id="d-maskine">-</p>
                        </div>
                        <div class="info-group">
                            <h3>Programnummer</h3>
                            <p id="d-program">-</p>
                        </div>
                        <div class="info-group">
                            <h3>Dato oprettet</h3>
                            <p id="d-dato">-</p>
                        </div>
                    </div>
                    <div class="detail-image-container">
                        <img id="d-image" src="" alt="Opstillingsbillede" class="hidden">
                        <div id="d-no-image" class="no-image-placeholder">Intet billede uploadet</div>
                    </div>
                </div>

                <div class="detail-section">
                    <h3>Nulpunkter</h3>
                    <div class="nulpunkter-grid">
                        <div class="n-box"><strong>G54:</strong> <span id="d-g54">-</span></div>
                        <div class="n-box"><strong>G55:</strong> <span id="d-g55">-</span></div>
                        <div class="n-box"><strong>G56:</strong> <span id="d-g56">-</span></div>
                    </div>
                </div>

                <div class="detail-section">
                    <h3>Værktøjsliste</h3>
                    <div class="tools-list" id="d-tools">
                        -
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
